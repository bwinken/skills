# mkdocs configuration for an LLM wiki
# Generated by wiki_mkdocs_setup.py from the llm-wiki skill.
# Feel free to edit — this is your wiki's config, not the skill's.
#
# Quick start:
#   pip install mkdocs mkdocs-material
#   mkdocs serve    # local preview at http://127.0.0.1:8000
#   mkdocs build    # builds static site into ./site/

site_name: My Wiki
site_description: A personal LLM-maintained knowledge base.

# Read the whole wiki folder (not just docs/).
# We exclude the immutable raw/ sources and the schema/config files.
docs_dir: .

# Files we don't want mkdocs to try to render as pages.
exclude_docs: |
  raw/
  SCHEMA.md
  mkdocs.yml
  .git/
  .gitignore
  site/
  .trash/

# Use the Material theme — great OOTB search, dark mode, navigation.
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Markdown extensions that make sense for a wiki:
# - admonition   → !!! note / !!! warning boxes
# - attr_list    → inline attributes ({ .class #id }) for fine-tuning
# - pymdownx.*   → syntax highlighting, collapsible sections, etc.
# - toc          → table of contents with permalinks
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

plugins:
  - search
